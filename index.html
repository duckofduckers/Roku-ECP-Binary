<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>RECP</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;padding:20px;position:relative;background:#000;overflow:hidden}.zorflax{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:radial-gradient(ellipse at 30% 40%, #0a0520, #000000);overflow:hidden}.quibble{position:absolute;background:white;border-radius:50%;opacity:0;animation:glorpfizz 3s infinite}@keyframes glorpfizz{0%,100%{opacity:0}50%{opacity:0.8}}.bloopnog{position:absolute;filter:blur(60px);border-radius:50%;opacity:0.5}.xylorg{width:50vw;height:50vw;background:#7c3aed;top:-20vh;left:-20vw;animation:wobblefloop 25s infinite alternate}.vortak{width:40vw;height:40vw;background:#ec4899;bottom:-15vh;right:-15vw;animation:wobblefloop 20s infinite alternate-reverse}.zimbab{width:35vw;height:35vw;background:#3b82f6;top:40%;left:60%;animation:wobblefloop 30s infinite alternate}@keyframes wobblefloop{0%{transform:translate(0,0) scale(1)}100%{transform:translate(5%,5%) scale(1.1)}}.splorg{position:absolute;background:radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);width:80vw;height:80vw;border-radius:50%;top:-20vh;left:-20vw;animation:spinspin 60s linear infinite}@keyframes spinspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.gnarble{position:relative;z-index:2;max-width:560px;width:100%;background:rgba(18,12,26,0.65);backdrop-filter:blur(12px);border-radius:56px;padding:52px 40px;text-align:center;border:1px solid rgba(139,92,246,0.4);box-shadow:0 25px 45px rgba(0,0,0,0.4)}.floob{font-size:20px;font-weight:500;color:#c4b5fd;background:rgba(30,19,41,0.8);display:inline-block;padding:8px 24px;border-radius:40px;margin-bottom:32px;font-family:monospace;letter-spacing:-0.3px;backdrop-filter:blur(4px)}.zorpglow{font-size:52px;font-weight:800;color:#f0e6ff;margin-bottom:12px;letter-spacing:-1px;text-shadow:0 0 20px rgba(139,92,246,0.5)}.wombus{font-size:18px;color:#c4b5fd;margin-bottom:48px;font-weight:400}.plorgon{padding:18px 32px;font-size:22px;font-weight:600;border:none;border-radius:60px;cursor:pointer;transition:0.15s ease;display:inline-flex;align-items:center;justify-content:center;gap:14px;width:100%;background:#7c3aed;color:white;box-shadow:0 8px 20px rgba(124,58,237,0.4)}.plorgon:hover{background:#8b5cf6;transform:scale(1.01)}.plorgon:active{transform:scale(0.99)}.bleem{margin-top:36px;font-size:12px;color:#6b4c8f}</style></head>
<body>
<div class="zorflax">
<div class="bloopnog xylorg"></div>
<div class="bloopnog vortak"></div>
<div class="bloopnog zimbab"></div>
<div class="splorg"></div>
</div>
<div class="gnarble">
<div class="floob">Roku-ECP-Binary</div>
<div class="zorpglow">RECP</div>
<div class="wombus">Roku External Control Protocol</div>
<button class="plorgon" onclick="window.location.href='https://github.com/duckofduckers/Roku-ECP-Binary'">RECP Repo <i class="fab fa-github"></i></button>
<div class="bleem">duckofduckers · 2026</div>
</div>
<script>for(let i=0;i<300;i++){let quib=document.createElement('div');quib.className='quibble';let qsize=Math.random()*3+1;quib.style.width=qsize+'px';quib.style.height=qsize+'px';quib.style.left=Math.random()*100+'%';quib.style.top=Math.random()*100+'%';quib.style.animationDelay=Math.random()*3+'s';quib.style.animationDuration=Math.random()*2+1+'s';document.querySelector('.zorflax').appendChild(quib);}</script>
</body>
</html>
